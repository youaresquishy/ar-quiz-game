<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireside Chat - Icebreaker</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#1434CB;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
    border:2px solid white;
    border-radius:20px;
    padding:40px;
    box-sizing:border-box;
}

h1{
    color:#F7B600;
    margin-top:0;
}

.question{
    font-size:24px;
    margin-bottom:30px;
    line-height:1.4;
}

button.option{
    width:100%;
    margin:10px 0;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:white;
    color:#1434CB;
    transition:0.2s;
}

button.option:hover{
    background:#F7B600;
}

.highlight{
    color:#F7B600;
    font-weight:bold;
}

#feedback{
    margin-top:30px;
    line-height:1.6;
    font-size:18px;
}

#nextBtn{
    display:none;
    margin-top:25px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#F7B600;
    color:#1434CB;
    font-weight:bold;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<h1>Fireside Chat - Icebreaker</h1>

<div id="question" class="question"></div>

<div id="options"></div>

<div id="feedback"></div>

<button id="nextBtn">Next Question</button>

</div>

<script>

const quiz = [

{
question:"Q1. What makes consumers feel most rewarded today?",
options:[
"Earning more points",
"Bigger cashback percentages",
"Relevant offers at the right moment",
"Luxury reward catalogues"
],
answer:"Relevant offers at the right moment",
explanation:"Consumers increasingly value relevance and immediacy over accumulating rewards they'll redeem later. Loyalty is shifting from rewards programs to engagement ecosystems."
},

{
question:"Q2. Which is hardest for issuers to build themselves?",
options:[
"Campaign reporting",
"Points management",
"A scaled merchant offer ecosystem",
"Customer communications"
],
answer:"A scaled merchant offer ecosystem",
explanation:"Building and maintaining thousands of merchant relationships and offers at scale requires a large ecosystem and continuous content refresh."
},

{
question:"Q3. Which statement is most likely to be true in 2030?",
options:[
"Points will disappear",
"Cashback will replace loyalty programs",
"Loyalty will become increasingly invisible and embedded",
"Consumers will join fewer programs"
],
answer:"Loyalty will become increasingly invisible and embedded",
explanation:"Loyalty is evolving from standalone rewards programs to always-on engagement embedded across everyday experiences, moving from cost to a monetisation driver."
}

];

let currentQuestion = 0;

const questionDiv = document.getElementById("question");
const optionsDiv = document.getElementById("options");
const feedbackDiv = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion(){

feedbackDiv.innerHTML="";
nextBtn.style.display="none";

const q=quiz[currentQuestion];

questionDiv.innerHTML=q.question;

optionsDiv.innerHTML="";

q.options.forEach(option=>{

const btn=document.createElement("button");

btn.className="option";

btn.innerHTML=option;

btn.onclick=function(){

document.querySelectorAll(".option").forEach(b=>b.disabled=true);

if(option===q.answer){

feedbackDiv.innerHTML=
"<p><span class='highlight'>Great choice.</span></p><p>"+q.explanation+"</p>";

}else{

feedbackDiv.innerHTML=
"<p><span class='highlight'>Interesting perspective.</span></p><p><strong>Answer:</strong> <span class='highlight'>"+q.answer+"</span></p><p>"+q.explanation+"</p>";

}

nextBtn.style.display="inline-block";

};

optionsDiv.appendChild(btn);

});

}

nextBtn.onclick=function(){

currentQuestion++;

if(currentQuestion<quiz.length){

loadQuestion();

}else{

document.querySelector(".container").innerHTML=
"<h1>Icebreaker Complete!</h1><h2 class='highlight'>Thanks for participating.</h2><p>You can now proceed to the AR experience.</p>";

}

};

loadQuestion();

</script>

</body>
</html>
